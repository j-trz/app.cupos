name: Avisar vencimientos próximos (Grupos y Productos)

# Dispara periódicamente GET /api/cron/check-deadlines: recordatorios de
# vencimiento (pago, nominación, emisión, entrada en gastos) para Grupos
# confirmados y Productos, con la antelación configurada en Settings
# (dias_aviso_vencimientos). Corrida diaria, no cada 10 min como la
# expiración de bloqueos — estos deadlines son de fecha, no de minutos.
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-deadlines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diag/cron-debug
      - name: Diagnóstico temporal (commitea el resultado al repo)
        run: |
          {
            echo "BACKEND_URL length: ${#BACKEND_URL}"
            echo "CRON_SECRET length: ${#CRON_SECRET}"
            echo "BACKEND_URL: ${BACKEND_URL}"
            echo "---"
            code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X GET "${BACKEND_URL}/api/cron/check-deadlines" \
              -H "X-Cron-Secret: ${CRON_SECRET}")
            echo "HTTP_CODE=$code"
            echo "BODY:"
            cat /tmp/resp.txt
          } > diag_output.txt 2>&1
          cat diag_output.txt
          git config user.name "diag-bot"
          git config user.email "diag-bot@users.noreply.github.com"
          git add diag_output.txt
          git commit -m "diag output"
          git push origin HEAD:diag/cron-debug
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
