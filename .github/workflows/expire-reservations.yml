name: Expirar reservas en bloqueo temporal

# Dispara periódicamente GET /api/cron/expire-reservations: sin esto, las
# reservas en bloqueo_temporal nunca vencen solas ni devuelven el cupo al
# stock (el backend corre serverless en Vercel, no hay ningún proceso en
# background propio — ver plans/DEPLOY.md, sección "El cron de expiración
# de reservas nunca corre").
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  expire-reservations:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de expiración
        run: |
          curl -sf -X GET "${{ secrets.BACKEND_URL }}/api/cron/expire-reservations" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"
