<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrador - Reservas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen py-8 font-['Montserrat']">
    <!-- Login Supabase -->
    <div id="login-container" class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6 mb-8">
        <h2 class="text-2xl font-bold text-center text-[#2c4b8b] mb-4">Iniciar sesión</h2>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="login-email" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="login-password" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <button type="submit" class="w-full bg-[#2c4b8b] hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">Entrar</button>
        </form>
        <div id="login-error" class="text-red-600 mt-2 text-center hidden"></div>
    </div>

    <!-- Dashboard principal -->
    <div id="admin-content" class="max-w-5xl mx-auto bg-white rounded-lg shadow-lg p-6 hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-[#2c4b8b]">Reservas recibidas</h1>
            <button onclick="logoutSupabase()" class="bg-gray-500 hover:bg-gray-700 text-white px-4 py-2 rounded">Cerrar sesión</button>
        </div>
        <div id="reservas-table-container">
            <!-- Aquí se cargará la tabla de reservas -->
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
