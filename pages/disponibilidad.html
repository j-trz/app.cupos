<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad de Vuelos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Login Supabase -->
    <div id="login-container" class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6 mb-8">
        <h2 class="text-2xl font-bold text-center text-[#2c4b8b] mb-4">Iniciar sesión</h2>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="login-email" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="login-password" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <button type="submit" class="w-full bg-[#2c4b8b] hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">Entrar</button>
        </form>
        <div id="login-error" class="text-red-600 mt-2 text-center hidden"></div>
    </div>
</head>
<body class="bg-gray-100 min-h-screen font-['Montserrat']">
        <header class="flex items-center h-16 bg-white shadow px-6">
        <img src="./admin/img/icon.png" alt="Logo" class="h-10 mr-4">
        <span class="text-xl font-bold text-[#2c4b8b]">Cupos</span>
    </header>
    <div class="max-w-7xl mx-auto bg-white rounded-lg shadow-lg mt-10 p-6">
        <h1 class="text-3xl font-bold text-center text-[#2c4b8b] mb-6">Disponibilidad de Cupos Aéreos</h1>
        
        <!-- Tabla de disponibilidad -->
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white border border-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Código Cupo</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Destino</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Compañía</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Disponibilidad</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Salida</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Regreso</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Precio</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-[#2c4b8b] uppercase tracking-wider">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-disponibilidad" class="bg-white divide-y divide-gray-200">
                    <!-- Las filas se cargarán dinámicamente -->
                    <tr>
                        <td colspan="8" class="px-6 py-4 text-center text-gray-500">
                            Cargando datos...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal del formulario de reserva -->
    <div id="modal-reserva" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-screen overflow-y-auto">
            <div class="flex justify-between items-center p-4 border-b">
                <h2 class="text-xl font-semibold">Formulario de Reserva</h2>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>

            <div class="p-6">
                <form id="reservaForm" class="space-y-6">
                     <label class="block text-sm font-medium text-gray-700 mb-1">Número de Pedido</label>
                <input type="text" name="pedido_id" id="pedido_id" readonly class="w-[200px] px-3 py-2 border border-gray-300 rounded-md bg-gray-100">
                    <!-- Información del vuelo -->
                    <div id="info-vuelo" class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                        <!-- Se llena dinámicamente -->
                    </div>

                    <!-- Datos del contacto principal -->
                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">Datos de Contacto</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Contacto *</label>
                                <input type="text" name="contacto_nombre" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                                <input type="email" name="contacto_email" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono *</label>
                                <input type="tel" name="contacto_telefono" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Agencia</label>
                                <input type="text" name="agencia" id="agencia" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                    </div>

                    <!-- Campos ocultos del vuelo -->
                    <div id="campos-ocultos">
                        <!-- Se llena dinámicamente -->
                    </div>

                    <!-- Contenedor de pasajeros -->
                    <div class="bg-white border border-gray-200 rounded-lg p-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-semibold text-gray-800">Pasajeros</h3>
                            <button type="button" onclick="agregarPasajero()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
                                + Agregar Pasajero
                            </button>
                        </div>
                        
                        <div id="pasajeros-container" class="space-y-4">
                            <!-- Pasajero 1 (por defecto) -->
                            <div class="pasajero-item bg-gray-50 border border-gray-200 rounded-lg p-4">
                                <div class="flex justify-between items-center mb-3">
                                    <h4 class="text-md font-medium text-gray-700">Pasajero 1</h4>
                                    <button type="button" onclick="this.parentElement.parentElement.remove()" class="text-red-500 hover:text-red-700 text-sm">Eliminar</button>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                    <div>
                                        <label class="block text-xs font-medium text-gray-600 mb-1">Nombre *</label>
                                        <input type="text" name="pasajeros[0].nombre" required class="w-full px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-600 mb-1">Apellido *</label>
                                        <input type="text" name="pasajeros[0].apellido" required class="w-full px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-600 mb-1">Documento *</label>
                                        <input type="text" name="pasajeros[0].documento" required class="w-full px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-600 mb-1">Fecha Nacimiento *</label>
                                        <input type="date" name="pasajeros[0].nacimiento" required class="w-full px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-600 mb-1">Nacionalidad *</label>
                                        <input type="text" name="pasajeros[0].nacionalidad" required class="w-full px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-600 mb-1">Tipo</label>
                                        <select name="pasajeros[0].tipo" class="w-full px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                                            <option value="Adulto">Adulto</option>
                                            <option value="Niño">Niño</option>
                                            <option value="Bebé">Bebé</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botón de envío -->
                    <div class="flex justify-center space-x-4">
                        <button type="button" onclick="cerrarModal()" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-3 px-8 rounded-lg transition-colors">
                            Cancelar
                        </button>
                        <button type="submit" class="bg-[#2c4b8b] hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition-colors shadow-md">
                            Enviar Reserva
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

 <script src="/js/script.js"></script>
</body>
</html>
