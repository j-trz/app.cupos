<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen font-['Montserrat']">
    <!-- Topbar -->
    <header class="flex items-center h-16 bg-white shadow px-6">
        <img src="./img/icon.png" alt="Logo" class="h-10 mr-4">
        <span class="text-xl font-bold text-[#2c4b8b]">Panel Admin</span>
    </header>
    <div class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-[#2c4b8b] text-white w-16 min-h-screen transition-all duration-300 shadow flex flex-col relative group">
            <div class="flex flex-col items-center mt-8 space-y-4">
                <button class="sidebar-btn flex items-center w-full px-4 py-2 hover:text-[#cc6200]  transition-colors" data-page="dashboard">
                    <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  
                    stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  
                    class="icon icon-tabler icons-tabler-outline icon-tabler-home w-6 h-6">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M5 12l-2 0l9 -9l9 9l-2 0" />
                        <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" />
                        <path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6" />
                    </svg>
                    <span class="ml-4 hidden">Dashboard</span>
                </button>
                <button class="sidebar-btn flex items-center w-full px-4 py-2 hover:text-[#cc6200] transition-colors" data-page="cupos">
                    <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  
                    stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="w-6 h-6 icon icon-tabler icons-tabler-outline icon-tabler-plane-tilt">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M14.5 6.5l3 -2.9a2.05 2.05 0 0 1 2.9 2.9l-2.9 3l2.5 7.5l-2.5 2.55l-3.5 -6.55l-3 3v3l-2 2l-1.5 -4.5l-4.5 -1.5l2 -2h3l3 -3l-6.5 -3.5l2.5 -2.5l7.5 2.5z" />
                    </svg>
                    <span class="ml-4 hidden">Cargar Cupo</span>
                </button>
                <button class="sidebar-btn flex items-center w-full px-4 py-2 hover:text-[#cc6200] transition-colors" data-page="solicitudes">
                  <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  
                  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="w-6 h-6 icon icon-tabler icons-tabler-outline icon-tabler-bell-bolt"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M13.5 17h-9.5a4 4 0 0 0 2 -3v-3a7 7 0 0 1 4 -6a2 2 0 1 1 4 0a7 7 0 0 1 4 6v1" />
                    <path d="M9 17v1a3 3 0 0 0 4.368 2.67" /><path d="M19 16l-2 3h4l-2 3" /></svg>
                    <span class="ml-4 hidden">Solicitudes</span>
                </button>
                <button class="sidebar-btn flex items-center w-full px-4 py-2 hover:text-[#cc6200] transition-colors" data-page="confirmaciones">
                  <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  
                  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  
                  class="icon icon-tabler icons-tabler-outline icon-tabler-ticket w-6 h-6">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                  <path d="M15 5l0 2" />
                  <path d="M15 11l0 2" /><path d="M15 17l0 2" />
                  <path d="M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-3a2 2 0 0 0 0 -4v-3a2 2 0 0 1 2 -2" />
                </svg>
                    <span class="ml-4 hidden">Confirmaciones</span>
                </button>
                <button class="sidebar-btn flex items-center w-full px-4 py-2 hover:text-[#cc6200] transition-colors" data-page="reportes">
                    <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  
                    stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  
                    class="icon icon-tabler icons-tabler-outline icon-tabler-chart-histogram w-6 h-6">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 3v18h18" />
                    <path d="M20 18v3" />
                    <path d="M16 16v5" />
                    <path d="M12 13v8" />
                    <path d="M8 16v5" />
                    <path d="M3 11c6 0 5 -5 9 -5s3 5 9 5" />
                </svg>
                    <span class="ml-4 hidden">Reportería</span>
                </button>
            </div>
            <div class="flex-1"></div>
            <!-- Flecha tipo tab en el borde derecho -->
            <button id="toggleSidebar" class="absolute index-0 text-white top-[30px] right-[-20px] w-[30px] h-[30px] rounded-r-full transform -translate-y-1/2 bg-[#2c4b8b] shadow-r p-1 z-10 transition-colors">
                <svg  xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  
                stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  
                class="text-xl icon icon-tabler icons-tabler-outline icon-tabler-chevron-right">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 6l6 6l-6 6" />
                </svg>
            </button>
        </aside>
        <!-- Main content -->
        <main id="main-content" class="flex-1 p-8">
            <!-- Aquí se cargará el contenido de cada sección -->
            <div id="dashboard-content"></div>
        </main>
    </div>
    <script src="/js/admin/dashboard.js"></script>
</body>
</html>
