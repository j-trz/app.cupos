openapi: 3.0.3
info:
  title: Sistema de Gestión de Cupos — API
  description: >
    API REST del backend en Go para gestión de cupos, reservas, grupos, cesiones,
    reportes, RBAC, notificaciones e IA. Ver `API.md` para la guía en prosa.

    Autenticación por JWT Bearer (24 h). La mayoría de los endpoints requieren
    además un permiso RBAC con código `MODULO_ACCION`; el rol `admin` tiene bypass total.
  version: 1.0.0
  contact:
    name: Sistema de Gestión de Cupos
servers:
  - url: http://localhost:5002/api
    description: Desarrollo local
  - url: https://{host}/api
    description: Producción
    variables:
      host:
        default: app-cupos-8uxo.vercel.app
tags:
  - name: Auth
  - name: Cron
  - name: Products
  - name: Orders
  - name: Passengers
  - name: Groups
  - name: Transfers
  - name: Reports
  - name: Settings
  - name: Export
  - name: AI
  - name: Data
  - name: Agencies
  - name: WhiteLabel
  - name: RBAC
  - name: Notifications
  - name: EmailConfig
  - name: Logs

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login y emisión de JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/register:
    post:
      tags: [Auth]
      summary: Alta de usuario (rol agency_user)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '200':
          description: Usuario creado y token emitido
          content:
            application/json:
              schema: { type: object }
        '400': { $ref: '#/components/responses/BadRequest' }

  /auth/profile:
    get:
      tags: [Auth]
      summary: Perfil del usuario autenticado
      responses:
        '200':
          description: Perfil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  profile: { $ref: '#/components/schemas/Profile' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/me/permissions:
    get:
      tags: [Auth, RBAC]
      summary: Códigos de permiso efectivos del usuario
      responses:
        '200':
          description: Lista de códigos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { type: string }

  /cron/expire-reservations:
    get:
      tags: [Cron]
      summary: Avisa y expira reservas en bloqueo temporal
      description: Protegido por header `X-Cron-Secret` (no usa JWT).
      security: []
      parameters:
        - $ref: '#/components/parameters/CronSecret'
      responses:
        '200':
          description: Resultado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  warned: { type: integer }
                  expired: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /cron/check-deadlines:
    get:
      tags: [Cron]
      summary: Envía recordatorios de deadlines operativos
      security: []
      parameters:
        - $ref: '#/components/parameters/CronSecret'
      responses:
        '200':
          description: Resultado
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /products/:
    get:
      tags: [Products]
      summary: Lista productos accesibles
      responses:
        '200':
          description: Lista de productos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Product' }
    post:
      tags: [Products]
      summary: Crea un producto
      description: 'Requiere permiso: PRODUCTS_CREATE'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Product' }
      responses:
        '201': { description: Creado }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/IntId'
    get:
      tags: [Products]
      summary: Detalle de producto
      responses:
        '200':
          description: Producto
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Products]
      summary: Actualiza un producto (PRODUCTS_UPDATE)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Product' }
      responses:
        '200': { description: Actualizado }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Products]
      summary: Elimina un producto (PRODUCTS_DELETE)
      responses:
        '200': { description: Eliminado }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /products/bulk:
    post:
      tags: [Products]
      summary: Importación masiva de productos (PRODUCTS_CREATE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/Product' }
      responses:
        '200': { description: Resultado por fila }
        '403': { $ref: '#/components/responses/Forbidden' }

  /products/{id}/shared-agencies:
    parameters:
      - $ref: '#/components/parameters/IntId'
    get:
      tags: [Products]
      summary: Agencias con las que se comparte el producto
      responses:
        '200':
          description: Códigos de agencia
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
    post:
      tags: [Products]
      summary: Comparte el producto con una agencia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agencia]
              properties:
                agencia: { type: string }
      responses:
        '200': { description: Compartido }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /products/{id}/shared-agencies/{agencia}:
    delete:
      tags: [Products]
      summary: Deja de compartir el producto con una agencia
      parameters:
        - $ref: '#/components/parameters/IntId'
        - name: agencia
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }

  /orders/:
    get:
      tags: [Orders]
      summary: Lista reservas (filtradas por rol/agencia)
      responses:
        '200':
          description: Lista de reservas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Reservation' }
    post:
      tags: [Orders]
      summary: Crea una reserva
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReservationInput' }
      responses:
        '201': { description: Creada }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /orders/blocked:
    get:
      tags: [Orders]
      summary: Reservas en bloqueo_temporal de la agencia
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Reservation' }

  /orders/{id}:
    parameters:
      - $ref: '#/components/parameters/IntId'
    get:
      tags: [Orders]
      summary: Detalle de reserva con pasajeros
      responses:
        '200':
          description: Reserva
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reservation' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Orders]
      summary: Actualiza una reserva
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Reservation' }
      responses:
        '200': { description: Actualizada }
    delete:
      tags: [Orders]
      summary: Elimina una reserva (RESERVATIONS_DELETE)
      responses:
        '200': { description: Eliminada }
        '403': { $ref: '#/components/responses/Forbidden' }

  /orders/{id}/doc-contable:
    put:
      tags: [Orders]
      summary: Agrega documento contable (confirma la reserva)
      parameters:
        - $ref: '#/components/parameters/IntId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doc_contable]
              properties:
                doc_contable: { type: string }
      responses:
        '200': { description: Confirmada }
        '400': { $ref: '#/components/responses/BadRequest' }

  /orders/{id}/confirm:
    post:
      tags: [Orders]
      summary: Confirma la reserva
      parameters:
        - $ref: '#/components/parameters/IntId'
      responses:
        '200': { description: Confirmada }

  /orders/{id}/cancel-request:
    put:
      tags: [Orders]
      summary: Solicita la cancelación de la reserva
      parameters:
        - $ref: '#/components/parameters/IntId'
      responses:
        '200': { description: Solicitud registrada }

  /orders/{id}/cancel-request/resolve:
    put:
      tags: [Orders]
      summary: Resuelve la solicitud de cancelación (RESERVATIONS_DELETE)
      parameters:
        - $ref: '#/components/parameters/IntId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveDecision' }
      responses:
        '200': { description: Resuelta }
        '403': { $ref: '#/components/responses/Forbidden' }

  /orders/{id}/passengers:
    post:
      tags: [Passengers]
      summary: Agrega un pasajero
      parameters:
        - $ref: '#/components/parameters/IntId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PassengerInput' }
      responses:
        '201': { description: Creado }

  /orders/{id}/passengers/{passengerId}:
    put:
      tags: [Passengers]
      summary: Asigna ticket/precio a un pasajero
      parameters:
        - $ref: '#/components/parameters/IntId'
        - $ref: '#/components/parameters/PassengerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                numero_ticket: { type: string }
                precio_venta: { type: number }
                neto_1: { type: number }
                doc_contable: { type: string }
      responses:
        '200': { description: Actualizado }
    delete:
      tags: [Passengers]
      summary: Elimina un pasajero
      parameters:
        - $ref: '#/components/parameters/IntId'
        - $ref: '#/components/parameters/PassengerId'
      responses:
        '200': { description: Eliminado }

  /orders/{id}/passengers/{passengerId}/full:
    put:
      tags: [Passengers]
      summary: Edita todos los datos de un pasajero
      parameters:
        - $ref: '#/components/parameters/IntId'
        - $ref: '#/components/parameters/PassengerId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PassengerInput' }
      responses:
        '200': { description: Actualizado }

  /orders/{id}/passengers/{passengerId}/duplicate:
    post:
      tags: [Passengers]
      summary: Duplica un pasajero
      parameters:
        - $ref: '#/components/parameters/IntId'
        - $ref: '#/components/parameters/PassengerId'
      responses:
        '201': { description: Duplicado }

  /groups/:
    get:
      tags: [Groups]
      summary: Lista grupos
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Group' }
    post:
      tags: [Groups]
      summary: Crea un grupo (GROUPS_CREATE)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Group' }
      responses:
        '201': { description: Creado }
        '403': { $ref: '#/components/responses/Forbidden' }

  /groups/{id}:
    parameters:
      - $ref: '#/components/parameters/IntId'
    get:
      tags: [Groups]
      summary: Detalle de grupo
      responses:
        '200':
          description: Grupo
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Group' }
    put:
      tags: [Groups]
      summary: Actualiza un grupo (GROUPS_UPDATE)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Group' }
      responses:
        '200': { description: Actualizado }
    delete:
      tags: [Groups]
      summary: Elimina un grupo (GROUPS_DELETE)
      responses:
        '200': { description: Eliminado }

  /groups/request:
    post:
      tags: [Groups]
      summary: Solicitud de grupo con opciones de itinerario
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GroupRequestInput' }
      responses:
        '201': { description: Solicitud creada }
        '400': { $ref: '#/components/responses/BadRequest' }

  /groups/{id}/send-quote:
    post:
      tags: [Groups]
      summary: Envía la cotización (GROUPS_UPDATE)
      parameters: [ { $ref: '#/components/parameters/IntId' } ]
      responses:
        '200': { description: Cotizada }

  /groups/{id}/accept:
    post:
      tags: [Groups]
      summary: Acepta la cotización
      parameters: [ { $ref: '#/components/parameters/IntId' } ]
      responses:
        '200': { description: Aceptada }
        '400': { $ref: '#/components/responses/BadRequest' }

  /groups/{id}/confirm:
    post:
      tags: [Groups]
      summary: Confirma el grupo (GROUPS_UPDATE)
      parameters: [ { $ref: '#/components/parameters/IntId' } ]
      responses:
        '200': { description: Confirmado }

  /groups/{id}/request-cancellation:
    post:
      tags: [Groups]
      summary: Solicita cancelar un grupo confirmado
      parameters: [ { $ref: '#/components/parameters/IntId' } ]
      responses:
        '200': { description: Solicitud registrada }

  /groups/{id}/resolve-cancellation:
    post:
      tags: [Groups]
      summary: Resuelve la cancelación (GROUPS_UPDATE)
      parameters: [ { $ref: '#/components/parameters/IntId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveDecision' }
      responses:
        '200': { description: Resuelta }

  /transfers:
    get:
      tags: [Transfers]
      summary: Cesiones del usuario/agencia
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AvailabilityTransfer' }
    post:
      tags: [Transfers]
      summary: Crea una cesión (TRANSFERS_CREATE)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferInput' }
      responses:
        '201': { description: Creada }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /transfers/all:
    get:
      tags: [Transfers]
      summary: Todas las cesiones (TRANSFERS_VIEW)
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AvailabilityTransfer' }

  /transfers/{id}/reclaim:
    post:
      tags: [Transfers]
      summary: Recupera disponibilidad de un espejo (TRANSFERS_CREATE)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity: { type: integer, minimum: 1 }
      responses:
        '200': { description: Recuperada }

  /reports/stats:
    get:
      tags: [Reports]
      summary: Totales del sistema (REPORTS_VIEW)
      responses:
        '200': { description: Métricas }
        '403': { $ref: '#/components/responses/Forbidden' }

  /reports/{report}:
    get:
      tags: [Reports]
      summary: Reportes GET varios (REPORTS_VIEW)
      description: >
        Incluye: evolution, agency-share, destinations-detail, evolution-revenue,
        occupancy, top-products, risk-alerts, cancellations, grupos,
        metrics-summary, metrics-by-destination, forecast-sales, fields.
      parameters:
        - name: report
          in: path
          required: true
          schema:
            type: string
            enum: [evolution, agency-share, destinations-detail, evolution-revenue, occupancy, top-products, risk-alerts, cancellations, grupos, metrics-summary, metrics-by-destination, forecast-sales, fields]
      responses:
        '200': { description: Datos del reporte }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Reports]
      summary: Reportes POST legacy con filtros (REPORTS_VIEW)
      description: >
        Incluye: dashboard-data, evolucion-agencias, agencias-data,
        detalle-destinos, destinos-compania, evolucion-pasajeros,
        evolucion-por-cupo, share-por-cupo, por-salida.
      parameters:
        - name: report
          in: path
          required: true
          schema:
            type: string
            enum: [dashboard-data, evolucion-agencias, agencias-data, detalle-destinos, destinos-compania, evolucion-pasajeros, evolucion-por-cupo, share-por-cupo, por-salida]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportFilterRequest' }
      responses:
        '200': { description: Datos del reporte }
        '403': { $ref: '#/components/responses/Forbidden' }

  /settings/:
    get:
      tags: [Settings]
      summary: Lista de ajustes (SETTINGS_VIEW)
      responses:
        '200':
          description: Ajustes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SystemSetting' }

  /settings/{key}:
    put:
      tags: [Settings]
      summary: Upsert de un ajuste (SETTINGS_UPDATE)
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: {}
      responses:
        '200':
          description: Ajuste guardado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemSetting' }

  /export/csv/{entityType}:
    get:
      tags: [Export]
      summary: Exporta un CSV por tipo de entidad
      parameters:
        - name: entityType
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: CSV
          content:
            text/csv:
              schema: { type: string }

  /backup:
    get:
      tags: [Export]
      summary: Respaldo de datos (BACKUP_VIEW)
      responses:
        '200': { description: Backup }
        '403': { $ref: '#/components/responses/Forbidden' }

  /ai/chat:
    post:
      tags: [AI]
      summary: Chat con el asistente (function calling)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatRequest' }
      responses:
        '200': { description: Respuesta del asistente }
        '400': { $ref: '#/components/responses/BadRequest' }

  /ai/providers:
    get:
      tags: [AI]
      summary: Lista proveedores LLM (AI_VIEW)
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AIProvider' }
    post:
      tags: [AI]
      summary: Crea proveedor (AI_UPDATE)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIProvider' }
      responses:
        '201': { description: Creado }
        '403': { $ref: '#/components/responses/Forbidden' }

  /ai/providers/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidId'
    put:
      tags: [AI]
      summary: Actualiza proveedor (AI_UPDATE)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIProvider' }
      responses:
        '200': { description: Actualizado }
    delete:
      tags: [AI]
      summary: Elimina proveedor (AI_UPDATE)
      responses:
        '200': { description: Eliminado }

  /ai/providers/{id}/test:
    post:
      tags: [AI]
      summary: Prueba la conexión del proveedor (AI_UPDATE)
      parameters: [ { $ref: '#/components/parameters/UuidId' } ]
      responses:
        '200': { description: Resultado de la prueba }

  /ai/sessions:
    get:
      tags: [AI]
      summary: Sesiones de chat del usuario
      responses:
        '200': { description: Lista de sesiones }

  /ai/sessions/{id}/messages:
    get:
      tags: [AI]
      summary: Mensajes de una sesión
      parameters: [ { $ref: '#/components/parameters/UuidId' } ]
      responses:
        '200': { description: Mensajes }

  /ai/sessions/{id}:
    delete:
      tags: [AI]
      summary: Elimina una sesión
      parameters: [ { $ref: '#/components/parameters/UuidId' } ]
      responses:
        '200': { description: Eliminada }

  /ai/sessions/{id}/title:
    put:
      tags: [AI]
      summary: Renombra una sesión
      parameters: [ { $ref: '#/components/parameters/UuidId' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
      responses:
        '200': { description: Renombrada }

  /ai/experts:
    get:
      tags: [AI]
      summary: Lista expertos de la agencia
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AIExpert' }
    post:
      tags: [AI]
      summary: Crea un experto (agency_admin o admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIExpertInput' }
      responses:
        '201': { description: Creado }

  /ai/experts/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidId'
    get:
      tags: [AI]
      summary: Detalle de experto
      responses:
        '200':
          description: Experto
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AIExpert' }
    put:
      tags: [AI]
      summary: Actualiza experto (agency_admin o admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIExpertInput' }
      responses:
