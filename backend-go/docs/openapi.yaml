components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IntId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    UuidId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PassengerId:
      name: passengerId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    CronSecret:
      name: X-Cron-Secret
      in: header
      required: true
      description: Debe coincidir con la variable de entorno CRON_SECRET.
      schema: { type: string }

  responses:
    BadRequest:
      description: Petición inválida
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: No autenticado o token inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Permisos insuficientes
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    LoginResponse:
      type: object
      properties:
        success: { type: boolean }
        token: { type: string }
        user: { $ref: '#/components/schemas/Profile' }

    RegisterInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        nombre: { type: string }
        apellido: { type: string }
        telefono: { type: string }
        agencia: { type: string }

    Profile:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        password: { type: string, writeOnly: true }
        nombre: { type: string }
        apellido: { type: string }
        telefono: { type: string }
        agencia: { type: string }
        admin: { type: boolean }
        activo: { type: boolean }
        role: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateUserInput:
      allOf:
        - $ref: '#/components/schemas/Profile'
        - type: object
          properties:
            role_id: { type: string, format: uuid, nullable: true }

    Product:
      type: object
      properties:
        id: { type: integer, format: int64 }
        codigo_cupo: { type: string }
        destino: { type: string }
        compania: { type: string }
        disponibilidad: { type: integer }
        cupo: { type: integer }
        vendidos: { type: integer }
        fecha_salida: { type: string, format: date-time, nullable: true }
        fecha_regreso: { type: string, format: date-time, nullable: true }
        precio: { type: number }
        neto_1: { type: number }
        op: { type: number }
        ruta: { type: string }
        pnr: { type: string }
        ficha: { type: string }
        temporada: { type: string }
        tipo_producto: { type: string }
        bloqueo_temporal_minutos: { type: integer }
        carryon: { type: boolean }
        handbag: { type: boolean }
        checkedbag: { type: boolean }
        inf_fare: { type: number }
        chd_fare: { type: number }
        is_blocked_for_sale: { type: boolean }
        servicio: { type: string }
        notas_externas: { type: string }
        notas_internas: { type: string }
        agencia: { type: string }
        restricted_agency: { type: string }
        source_agency: { type: string }
        transfer_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Reservation:
      type: object
      properties:
        id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        created_by: { type: string, format: uuid }
        estado:
          type: string
          enum: [bloqueo_temporal, confirmada, solicitud_cancelacion, cancelada, expirada, cedido]
        bloqueo_expira_at: { type: string, format: date-time, nullable: true }
        precio_venta: { type: number }
        neto_1: { type: number }
        pedido_id: { type: string }
        agencia: { type: string }
        contacto_nombre: { type: string }
        contacto_email: { type: string }
        contacto_telefono: { type: string }
        doc_contable: { type: string }
        passengers:
          type: array
          items: { $ref: '#/components/schemas/Passenger' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ReservationInput:
      allOf:
        - $ref: '#/components/schemas/Reservation'
        - type: object
          properties:
            passengers:
              type: array
              items: { $ref: '#/components/schemas/PassengerInput' }

    Passenger:
      type: object
      properties:
        id: { type: integer, format: int64 }
        reservation_id: { type: integer, format: int64 }
        pedido_id: { type: string }
        nombre: { type: string }
        apellido: { type: string }
        documento: { type: string }
        nacimiento: { type: string, format: date-time, nullable: true }
        nacionalidad: { type: string }
        tipo_pasajero: { type: string }
        nro: { type: integer, description: '1 = venta, 0 = acompañante' }
        estado: { type: string }
        numero_ticket: { type: string }
        precio_venta: { type: number }
        neto_1: { type: number }
        doc_contable: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PassengerInput:
      type: object
      properties:
        nombre: { type: string }
        apellido: { type: string }
        documento: { type: string }
        nacimiento: { type: string, description: 'YYYY-MM-DD o RFC3339' }
        nacionalidad: { type: string }
        tipo_pasajero: { type: string }
        precio_venta: { type: number, nullable: true }
        neto_1: { type: number, nullable: true }
        doc_contable: { type: string }

    Group:
      type: object
      properties:
        id: { type: integer, format: int64 }
        solicitud_id: { type: string, format: uuid, nullable: true }
        opcion_numero: { type: integer }
        vendedor: { type: string, format: uuid }
        agency: { type: string }
        itinerario: { type: string }
        destino: { type: string }
        compania: { type: string }
        condiciones: { type: string }
        cantidad_lugares: { type: integer }
        cantidad_liberados: { type: integer }
        salida: { type: string, format: date-time, nullable: true }
        regreso: { type: string, format: date-time, nullable: true }
        neto_01: { type: number }
        vencimiento_cotizacion: { type: string, format: date-time, nullable: true }
        estado_cotizacion:
          type: string
          enum: [pendiente, cotizada, aceptada, rechazada]
        estado_reservar:
          type: string
          enum: ['', confirmada, cancelacion_solicitada, cancelada]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GroupRequestInput:
      type: object
      required: [cantidad_lugares, opciones]
      properties:
        cantidad_lugares: { type: integer, minimum: 1 }
        notas_vendedor: { type: string }
        opciones:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              itinerario: { type: string }
              notas: { type: string }

    TransferInput:
      type: object
      required: [product_id, target_agency, quantity]
      properties:
        product_id: { type: integer, format: int64 }
        target_agency: { type: string }
        quantity: { type: integer, minimum: 1 }

    AvailabilityTransfer:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: integer, format: int64 }
        source_agency: { type: string }
        target_agency: { type: string }
        quantity: { type: integer }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ResolveDecision:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, decline]
        notas: { type: string }

    ReportFilterRequest:
      type: object
      properties:
        userId: { type: string }
        granularidad: { type: string }
        filters:
          type: object
          additionalProperties: true

    SystemSetting:
      type: object
      properties:
        key: { type: string }
        value: {}
