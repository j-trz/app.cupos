<!--
  Punto de inserción estándar de los temas oficiales de GitHub Pages
  (jekyll-theme-cayman incluido): renderiza como diagramas los bloques
  ```mermaid de FLUJOS_FUNCIONALIDADES.md, que kramdown/rouge dejan como
  texto plano dentro de <div class="language-mermaid">.
-->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('div.language-mermaid').forEach(function (block) {
      var code = block.querySelector('code');
      var text = code ? code.textContent : block.textContent;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = text;
      block.replaceWith(div);
    });
    if (window.mermaid) {
      mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
    }
  });
</script>
